name: Deploy to Railway

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA to deploy (defaults to current ref)"
        required: false
        type: string

concurrency:
  group: railway-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    name: Trigger & monitor Railway deployment
    runs-on: ubuntu-latest

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      SERVICE_ID: 17d4d036-2546-471f-82e4-7a5e412d3bce
      ENVIRONMENT_ID: 443da5d6-969b-4e9d-a1f4-75fea7c94a13
      COMMIT_SHA: ${{ inputs.commit_sha || github.sha }}

    steps:
      - name: Verify RAILWAY_TOKEN is set
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN secret is not configured for this repo" >&2
            exit 1
          fi

      - name: Trigger deployment
        id: trigger
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg service "$SERVICE_ID" \
            --arg env "$ENVIRONMENT_ID" \
            --arg sha "$COMMIT_SHA" \
            '{query: "mutation($s:String!,$e:String!,$c:String!){ serviceInstanceDeployV2(serviceId:$s, environmentId:$e, commitSha:$c) }", variables: {s:$service, e:$env, c:$sha}}')

          RESPONSE=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          echo "API response: $RESPONSE"

          ERR=$(echo "$RESPONSE" | jq -r '.errors // empty')
          if [ -n "$ERR" ]; then
            echo "Railway API error: $ERR" >&2
            exit 1
          fi

          DEPLOYMENT_ID=$(echo "$RESPONSE" | jq -er '.data.serviceInstanceDeployV2')
          echo "deployment_id=$DEPLOYMENT_ID" >> "$GITHUB_OUTPUT"
          echo "Deployment triggered for $COMMIT_SHA: $DEPLOYMENT_ID"

      - name: Monitor deployment status
        env:
          DEPLOYMENT_ID: ${{ steps.trigger.outputs.deployment_id }}
        run: |
          set -euo pipefail
          echo "Monitoring deployment $DEPLOYMENT_ID ..."

          STATUS_PAYLOAD=$(jq -n --arg id "$DEPLOYMENT_ID" \
            '{query: "query($i:String!){ deployment(id:$i){ id status } }", variables: {i:$id}}')

          for i in $(seq 1 40); do
            sleep 15

            RESPONSE=$(curl -sS -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$STATUS_PAYLOAD")

            STATUS=$(echo "$RESPONSE" | jq -r '.data.deployment.status // "UNKNOWN"')
            echo "[$(date '+%H:%M:%S')] Status: $STATUS"

            case "$STATUS" in
              SUCCESS)
                echo "Deployment succeeded."
                exit 0
                ;;
              FAILED|CRASHED)
                echo "Deployment $STATUS — fetching build logs..."
                LOGS_PAYLOAD=$(jq -n --arg id "$DEPLOYMENT_ID" \
                  '{query: "query($i:String!){ buildLogs(deploymentId:$i, filter:\"\", limit:80){ message } }", variables: {i:$id}}')
                curl -sS -X POST https://backboard.railway.app/graphql/v2 \
                  -H "Authorization: Bearer $RAILWAY_TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "$LOGS_PAYLOAD" | jq -r '.data.buildLogs[-40:][].message'
                exit 1
                ;;
            esac
          done

          echo "Timed out after 10 minutes" >&2
          exit 1
