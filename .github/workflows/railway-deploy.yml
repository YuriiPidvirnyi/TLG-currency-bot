name: Deploy to Railway

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Trigger & monitor Railway deployment
    runs-on: ubuntu-latest

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      SERVICE_ID: 17d4d036-2546-471f-82e4-7a5e412d3bce
      ENVIRONMENT_ID: 443da5d6-969b-4e9d-a1f4-75fea7c94a13

    steps:
      - name: Trigger deployment for commit ${{ github.sha }}
        id: trigger
        run: |
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\":\"mutation { serviceInstanceDeployV2(serviceId: \\\"$SERVICE_ID\\\", environmentId: \\\"$ENVIRONMENT_ID\\\", commitSha: \\\"${{ github.sha }}\\\") }\"}")

          echo "API response: $RESPONSE"

          DEPLOYMENT_ID=$(echo "$RESPONSE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
if 'errors' in d:
    print('ERROR: ' + str(d['errors']), file=sys.stderr)
    sys.exit(1)
print(d['data']['serviceInstanceDeployV2'])
")
          echo "deployment_id=$DEPLOYMENT_ID" >> $GITHUB_OUTPUT
          echo "Deployment triggered: $DEPLOYMENT_ID"

      - name: Monitor deployment status
        run: |
          DEPLOYMENT_ID="${{ steps.trigger.outputs.deployment_id }}"
          echo "Monitoring deployment $DEPLOYMENT_ID ..."

          for i in $(seq 1 40); do
            sleep 15

            RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"query\":\"{ deployment(id: \\\"$DEPLOYMENT_ID\\\") { id status } }\"}")

            STATUS=$(echo "$RESPONSE" | python3 -c "
import sys, json
d = json.load(sys.stdin)
print(d['data']['deployment']['status'])
")
            echo "[$(date '+%H:%M:%S')] Status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Deployment succeeded!"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CRASHED" ]; then
              echo "Deployment $STATUS — fetching build logs..."

              curl -s -X POST https://backboard.railway.app/graphql/v2 \
                -H "Authorization: Bearer $RAILWAY_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"query\":\"{ buildLogs(deploymentId: \\\"$DEPLOYMENT_ID\\\", filter: \\\"\\\", limit: 80) { message } }\"}" | \
                python3 -c "
import sys, json
d = json.load(sys.stdin)
logs = d.get('data', {}).get('buildLogs', [])
for l in logs[-40:]:
    print(l['message'])
"
              exit 1
            fi
          done

          echo "Timed out after 10 minutes"
          exit 1
